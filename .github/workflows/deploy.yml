on:
  workflow_call:
    inputs:
      environment_name:
        description: GitHub Environment to deploy to
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment_name }}
    environment: ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Show flyctl version
        run: flyctl version

      - name: Deploy to Fly
        env:
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          NO_COLOR: "1"
        run: flyctl deploy --remote-only --yes --app "$FLY_APP_NAME"
