app = "mokupona-stack-b568"
kill_signal = "SIGINT"
kill_timeout = 5

[env]
DATABASE_URL = "file:/data/sqlite.db"
IMAGE_UPLOAD_FOLDER = "/data/uploads/images"
PORT = "8080"

[experimental]
auto_rollback = true

[mounts]
source = "data"
destination = "/data"

[http_service]
internal_port = 8080
force_https = true
auto_start_machines = true
auto_stop_machines = "off"

  [http_service.concurrency]
  hard_limit = 25
  soft_limit = 20
  type = "requests"

  [[http_service.checks]]
  interval = "10s"
  grace_period = "5s"
  method = "GET"
  path = "/healthcheck"
  timeout = "2s"
